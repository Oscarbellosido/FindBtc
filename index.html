<style>
/* ── CSS Variables ─────────────────────────────────────────────────────────── */
:root {
  --bg-primary: #1a1a2e;
  --bg-secondary: #16213e;
  --bg-card: #0f3460;
  --text-primary: #e0e0e0;
  --text-secondary: #a0a0b0;
  --accent: #f7931a;
  --border: rgba(247,147,26,0.2);
  --input-bg: #1e2a45;
  --shadow: rgba(0,0,0,0.3);
}
body.light-mode {
  --bg-primary: #f5f5f5;
  --bg-secondary: #ffffff;
  --bg-card: #e8f0fe;
  --text-primary: #1a1a2e;
  --text-secondary: #555577;
  --accent: #e07800;
  --border: rgba(224,120,0,0.3);
  --input-bg: #ffffff;
  --shadow: rgba(0,0,0,0.1);
}

/* ── Base ──────────────────────────────────────────────────────────────────── */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg-primary); color: var(--text-primary);
  font-family: 'Courier New', monospace;
  min-height: 100vh; padding: 2rem 1rem;
  transition: background-color 0.3s ease, color 0.3s ease;
}
.container { max-width: 860px; margin: 0 auto; position: relative; }
h1 { color: var(--accent); font-size: 1.6rem; margin-bottom: 0.3rem; }
.subtitle { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 1rem; }

/* ── Tabs ──────────────────────────────────────────────────────────────────── */
.app-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; }
.tab-btn {
  background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary);
  padding: 0.55rem 1.2rem; border-radius: 8px; font-size: 0.82rem;
  cursor: pointer; font-family: 'Courier New', monospace; transition: all 0.2s; white-space: nowrap;
}
.tab-btn:hover { background: var(--bg-secondary); color: var(--text-primary); border-color: var(--border); }
.tab-btn.active { background: #f7931a18; color: var(--accent); border-color: #f7931a55; font-weight: bold; }

/* ── Search ────────────────────────────────────────────────────────────────── */
.search-box { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
input[type="text"] {
  flex: 1; background: var(--input-bg); border: 1px solid var(--border); color: var(--text-primary);
  padding: 0.75rem 1rem; border-radius: 6px;
  font-family: 'Courier New', monospace; font-size: 0.85rem;
  outline: none; transition: border-color 0.2s, background-color 0.3s ease, color 0.3s ease;
}
input[type="text"]:focus { border-color: var(--accent); }
input[type="text"]::placeholder { color: var(--text-secondary); }
button {
  background: var(--accent); color: #000; border: none;
  padding: 0.75rem 1.5rem; border-radius: 6px;
  font-weight: bold; font-size: 0.95rem; cursor: pointer;
  transition: background 0.2s; white-space: nowrap;
}
button:hover { background: #e8821a; }
button:disabled { background: #555; color: #888; cursor: not-allowed; }
.hint { color: var(--text-secondary); font-size: 0.75rem; margin-bottom: 0.75rem; }
.hint span { color: #f7931a88; }
.btn-sec {
  background: var(--bg-card) !important; color: var(--text-secondary) !important; border: 1px solid var(--border) !important;
  font-weight: normal !important; font-size: 0.82rem !important;
}
.btn-sec:hover { background: var(--bg-secondary) !important; color: var(--text-primary) !important; }

/* ── History ───────────────────────────────────────────────────────────────── */
.history-section { margin-bottom: 1.5rem; }
.history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem; }
.history-label { color: var(--text-secondary); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; }
.history-clear { background: none; border: none; color: var(--text-secondary); font-size: 0.7rem; cursor: pointer; padding: 0; font-family: 'Courier New', monospace; transition: color 0.15s; }
.history-clear:hover { background: none; color: #e05050; }
.history-items { display: flex; flex-wrap: wrap; gap: 0.4rem; }
.hist-item { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); font-size: 0.72rem; padding: 0.25rem 0.6rem; border-radius: 4px; cursor: pointer; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: all 0.15s; font-family: 'Courier New', monospace; }
.hist-item:hover { border-color: #f7931a66; color: var(--text-primary); background: var(--bg-secondary); }

/* ── Status ────────────────────────────────────────────────────────────────── */
#status { text-align: center; padding: 1.5rem; color: var(--text-secondary); font-size: 0.9rem; display: none; }
#status.loading { display: block; }
#status.error { display: block; color: #e05050; }

/* ── Price bar ─────────────────────────────────────────────────────────────── */
.price-bar { display: flex; align-items: center; gap: 0.5rem; padding: 0.45rem 0.85rem; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 1.5rem; font-size: 0.75rem; transition: background-color 0.3s ease; }
.price-bar .pl { color: var(--text-secondary); }
.price-bar .pv { color: var(--accent); font-weight: bold; }
.price-bar .src { color: var(--text-secondary); font-size: 0.68rem; margin-left: auto; }

/* ── Tracker ───────────────────────────────────────────────────────────────── */
.tracker-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1.5rem; transition: background-color 0.3s ease; }
.tracker-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
.tracker-title { color: #60a5fa; font-size: 0.9rem; font-weight: bold; }
.tracker-stop { background: #1a1010; border: 1px solid #3a1a1a; color: #e08080; padding: 0.28rem 0.7rem; border-radius: 6px; font-size: 0.7rem; cursor: pointer; font-family: 'Courier New', monospace; transition: all 0.15s; }
.tracker-stop:hover { background: #2a1010; color: #ff9090; }
.tracker-phases { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
.ph { padding: 0.45rem 0.85rem; border-radius: 8px; font-size: 0.73rem; border: 1px solid transparent; transition: all 0.5s ease; white-space: nowrap; }
.ph-inactive { color: #2a2a2a; background: #0a0a0a; border-color: #1a1a1a; }
.ph-active   { color: #fbbf24; background: #1a1000; border-color: #3a2800; animation: blink 1.5s ease-in-out infinite; }
.ph-partial  { color: #fb923c; background: #1a0c00; border-color: #3a1c00; animation: blink 1.5s ease-in-out infinite; }
.ph-done     { color: #4ade80; background: #061510; border-color: #0e2e1c; }
.ph-arrow    { color: var(--text-secondary); font-size: 0.85rem; }
.tracker-bar-wrap { background: #0a0a0a; border-radius: 20px; height: 10px; overflow: hidden; margin-bottom: 1rem; border: 1px solid #1a1a1a; }
.tracker-bar-fill { height: 100%; border-radius: 20px; transition: width 0.9s ease, background-color 0.9s; }
.tbf-mempool { width: 20%; background: linear-gradient(90deg,#854d0e 0%,#fbbf24 50%,#854d0e 100%); background-size: 200% 100%; animation: shimmer 2.5s linear infinite; }
.tbf-partial { background: linear-gradient(90deg,#9a3412,#f97316); }
.tbf-done    { background: linear-gradient(90deg,#166534,#4ade80); }
@keyframes shimmer { 0% { background-position: 100% center; } 100% { background-position: -100% center; } }
.tracker-status { font-size: 0.83rem; color: var(--text-secondary); margin-bottom: 0.6rem; }
.tracker-fee-row { font-size: 0.74rem; color: var(--text-secondary); margin-bottom: 0.85rem; display: flex; align-items: center; flex-wrap: wrap; gap: 0.25rem; }
.tracker-fee-row strong { color: var(--text-primary); }
.tracker-eta { color: #fbbf24 !important; }
.tracker-footer { display: flex; justify-content: space-between; align-items: center; font-size: 0.67rem; color: var(--text-secondary); border-top: 1px solid var(--border); padding-top: 0.55rem; }
.tracker-countdown { color: #3a5a8a; }
.track-btn { display: inline-flex; align-items: center; gap: 0.4rem; background: var(--bg-secondary); border: 1px solid var(--border); color: #60a5fa; padding: 0.55rem 1.1rem; border-radius: 8px; font-size: 0.79rem; cursor: pointer; font-family: 'Courier New', monospace; transition: all 0.2s; margin-top: 1rem; }
.track-btn:hover { background: var(--bg-card); border-color: var(--border); color: #90c4f8; }

/* ── Plain-language summary ────────────────────────────────────────────────── */
.plain-summary {
  padding: 0.85rem 1.5rem; background: var(--bg-secondary);
  border-bottom: 1px solid var(--border); font-size: 0.79rem;
  color: var(--text-secondary); line-height: 1.65;
  transition: background-color 0.3s ease;
}
.plain-summary strong { color: var(--accent); }
.plain-summary .ps-icon { font-size: 0.72rem; color: var(--text-secondary); margin-right: 0.3rem; }

/* ── Transaction hero ──────────────────────────────────────────────────────── */
.tx-hero { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 1.75rem; overflow: hidden; transition: background-color 0.3s ease; }
.tx-status-banner { padding: 1.1rem 1.5rem; display: flex; align-items: center; gap: 0.75rem; font-size: 1.05rem; font-weight: bold; letter-spacing: 0.04em; }
.tx-status-banner.confirmed { background: #14532d; color: #86efac; border-bottom: 1px solid #166534; }
.tx-status-banner.pending   { background: #451a03; color: #fdba74; border-bottom: 1px solid #78350f; animation: blink 1.8s ease-in-out infinite; }
.tx-status-icon { font-size: 1.3rem; }
.tx-hero-body { padding: 1.75rem 1.5rem 1.5rem; }
.tx-amount-hero { font-size: 2.4rem; font-weight: bold; color: var(--accent); line-height: 1; margin-bottom: 0.4rem; letter-spacing: -0.02em; }
.tx-amount-hero .unit { font-size: 1.15rem; color: var(--text-secondary); font-weight: normal; margin-left: 0.35rem; }
.tx-fiat-hero { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 1.5rem; }
.tx-meta-row { display: flex; gap: 2rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
.tx-meta-cell { display: flex; flex-direction: column; gap: 0.15rem; }
.tx-meta-cell .lbl { color: var(--text-secondary); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.06em; }
.tx-meta-cell .val { color: var(--text-primary); font-size: 0.88rem; }
.tx-flow-line { display: flex; align-items: center; gap: 0.6rem; color: var(--text-secondary); font-size: 0.82rem; padding-top: 1rem; margin-top: 0.5rem; border-top: 1px solid var(--border); }
.tx-flow-line .fc { color: #64b5f6; font-weight: bold; font-size: 0.88rem; }
.tx-flow-line .arr { color: var(--accent); font-size: 1.1rem; }
.dest-banner { display: flex; align-items: center; gap: 0.7rem; flex-wrap: wrap; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 0.7rem 1rem; margin-top: 0.85rem; font-size: 0.85rem; }
.dest-banner .dl { color: var(--text-secondary); white-space: nowrap; }
.dest-banner .dn { color: #60a5fa; font-weight: bold; }
details { margin-top: 1rem; }
details summary { color: var(--text-secondary); font-size: 0.75rem; cursor: pointer; padding: 0.3rem 0; list-style: none; display: flex; align-items: center; gap: 0.4rem; user-select: none; transition: color 0.15s; }
details summary:hover { color: var(--text-primary); }
details summary::before { content: '▶'; font-size: 0.55rem; transition: transform 0.2s; }
details[open] summary::before { transform: rotate(90deg); }
.det-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.5rem; margin-top: 0.75rem; }
.det-cell { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 0.6rem 0.8rem; transition: background-color 0.3s ease; }
.det-cell .lbl { color: var(--text-secondary); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.2rem; }
.det-cell .val { color: var(--text-primary); font-size: 0.8rem; word-break: break-all; }
.txid-mono { font-size: 0.62rem; color: var(--text-secondary); word-break: break-all; line-height: 1.5; }

/* ── Entity badge ──────────────────────────────────────────────────────────── */
.entity-badge { display: inline-flex; align-items: center; gap: 0.2rem; background: #0f2040; color: #60a5fa; border: 1px solid #1e4070; font-size: 0.65rem; padding: 0.15rem 0.5rem; border-radius: 8px; white-space: nowrap; font-style: normal; font-weight: bold; }

/* ── Address hero ──────────────────────────────────────────────────────────── */
.addr-hero { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 14px; padding: 1.75rem 1.5rem 0; margin-bottom: 1.75rem; overflow: hidden; transition: background-color 0.3s ease; }
.addr-hero-top { margin-bottom: 1.5rem; }
.addr-hero-sublabel { color: var(--text-secondary); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.4rem; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
.addr-type-badge { background: var(--bg-card); color: #64b5f6; font-size: 0.62rem; padding: 0.12rem 0.45rem; border-radius: 8px; border: 1px solid var(--border); font-weight: normal; white-space: nowrap; text-transform: none; letter-spacing: 0; }
.addr-str { color: var(--text-secondary); font-size: 0.7rem; word-break: break-all; margin-top: 0.1rem; }
.addr-balance-hero { font-size: 2.6rem; font-weight: bold; color: var(--accent); line-height: 1; margin-bottom: 0.4rem; letter-spacing: -0.025em; }
.addr-balance-hero .unit { font-size: 1.1rem; color: var(--text-secondary); font-weight: normal; }
.addr-fiat-hero { font-size: 1.05rem; color: var(--text-secondary); margin-bottom: 1.75rem; }
.addr-stats-row { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid var(--border); }
.addr-stat { padding: 1.1rem 1.25rem; border-right: 1px solid var(--border); }
.addr-stat:last-child { border-right: none; }
.addr-stat .lbl { color: var(--text-secondary); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; display: flex; align-items: center; gap: 0.3rem; }
.addr-stat .arrow { font-size: 0.95rem; }
.addr-stat .arrow.dn { color: #4caf50; }
.addr-stat .arrow.up { color: #e05050; }
.addr-stat .v { font-size: 1rem; font-weight: bold; }
.addr-stat .v.grn { color: #4caf50; }
.addr-stat .v.red { color: #e05050; }
.addr-stat .v.neu { color: var(--text-primary); }
.addr-stat .sub { color: var(--text-secondary); font-size: 0.67rem; margin-top: 0.25rem; }

/* ── Bell / Alert button ───────────────────────────────────────────────────── */
.bell-btn {
  background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary);
  padding: 0.3rem 0.65rem; border-radius: 6px; font-size: 0.73rem;
  cursor: pointer; font-family: 'Courier New', monospace; transition: all 0.15s; white-space: nowrap;
}
.bell-btn:hover { border-color: #f7931a44; color: var(--text-primary); }
.bell-btn.active { background: #0e1e10; border-color: #1e4a20; color: #4caf50; }
.bell-btn.active:hover { background: #112314; }

/* ── Wallet section ────────────────────────────────────────────────────────── */
.wallet-topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 0.5rem; }
.wallet-topbar-title { color: var(--text-secondary); font-size: 0.88rem; }
.wallet-topbar-actions { display: flex; gap: 0.4rem; }
.wallet-add-btn { background: #f7931a18; border: 1px solid #f7931a44; color: var(--accent); padding: 0.45rem 0.9rem; border-radius: 8px; font-size: 0.78rem; cursor: pointer; font-family: 'Courier New', monospace; transition: all 0.2s; }
.wallet-add-btn:hover { background: #f7931a30; }
.wallet-refresh-btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); padding: 0.45rem 0.9rem; border-radius: 8px; font-size: 0.78rem; cursor: pointer; font-family: 'Courier New', monospace; transition: all 0.2s; }
.wallet-refresh-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }
.wallet-add-form { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; margin-bottom: 1.25rem; display: flex; flex-direction: column; gap: 0.65rem; transition: background-color 0.3s ease; }
.wallet-add-form input { background: var(--input-bg); border: 1px solid var(--border); color: var(--text-primary); padding: 0.65rem 0.9rem; border-radius: 6px; font-family: 'Courier New', monospace; font-size: 0.82rem; outline: none; transition: border-color 0.2s; }
.wallet-add-form input:focus { border-color: var(--accent); }
.wallet-add-form input::placeholder { color: var(--text-secondary); }
.wallet-form-btns { display: flex; gap: 0.5rem; }
.wallet-add-error { color: #e05050; font-size: 0.73rem; min-height: 1rem; }
.wallet-empty-state { text-align: center; padding: 3rem 1rem; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; }
.wallet-summary-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 14px; padding: 1.75rem 1.5rem 1.5rem; margin-bottom: 1.75rem; transition: background-color 0.3s ease; }
.ws-label { color: var(--text-secondary); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.5rem; }
.ws-btc { font-size: 2.8rem; font-weight: bold; color: var(--accent); line-height: 1; margin-bottom: 0.35rem; letter-spacing: -0.025em; }
.ws-btc .unit { font-size: 1.2rem; color: var(--text-secondary); font-weight: normal; }
.ws-fiat { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 1.5rem; }
.ws-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.5rem; }
.ws-stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; transition: background-color 0.3s ease; }
.ws-stat-lbl { color: var(--text-secondary); font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.35rem; }
.ws-stat-val { font-size: 0.88rem; font-weight: bold; }
.ws-stat-val.grn { color: #4caf50; }
.ws-stat-val.red { color: #e05050; }
.ws-stat-val.neu { color: var(--text-primary); }
.ws-fiat-sm { color: var(--text-secondary); font-size: 0.7rem; font-weight: normal; }
.wallet-addr-item { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.25rem; display: flex; justify-content: space-between; align-items: center; gap: 0.75rem; margin-bottom: 0.55rem; flex-wrap: wrap; transition: border-color 0.15s, background-color 0.3s ease; }
.wallet-addr-item:hover { border-color: #f7931a33; }
.wai-info { flex: 1; min-width: 0; }
.wai-name { color: var(--accent); font-size: 0.82rem; font-weight: bold; margin-bottom: 0.2rem; }
.wai-addr { color: var(--text-secondary); font-size: 0.67rem; margin-bottom: 0.3rem; word-break: break-all; }
.wai-bal { color: var(--text-primary); font-size: 0.88rem; font-weight: bold; }
.wai-bal.err { color: #e05050; font-size: 0.75rem; font-weight: normal; }
.wai-fiat { color: var(--text-secondary); font-size: 0.68rem; font-weight: normal; }
.wai-actions { display: flex; gap: 0.4rem; align-items: center; flex-shrink: 0; }
.wai-view-btn { background: #1a2a1a; border: 1px solid #2a4a2a; color: #4caf50; padding: 0.3rem 0.65rem; border-radius: 6px; font-size: 0.72rem; cursor: pointer; font-family: 'Courier New', monospace; transition: all 0.15s; }
.wai-view-btn:hover { background: #1e3a1e; color: #6cf0a0; }
.wai-del-btn { background: #1a0d0d; border: 1px solid #3a1a1a; color: #e05050; padding: 0.3rem 0.5rem; border-radius: 6px; font-size: 0.75rem; cursor: pointer; font-family: 'Courier New', monospace; transition: all 0.15s; }
.wai-del-btn:hover { background: #2a1010; }

/* ── Shared card ───────────────────────────────────────────────────────────── */
.card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem 1.5rem; margin-bottom: 1.75rem; transition: background-color 0.3s ease; }
.card h2 { color: var(--accent); font-size: 1rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; display: flex; align-items: center; flex-wrap: wrap; gap: 0.5rem; }

/* ── Flow analysis ─────────────────────────────────────────────────────────── */
.summary-text { color: var(--text-primary); font-size: 0.82rem; line-height: 1.65; }
.summary-text p { margin-bottom: 0.5rem; }
.summary-text strong { color: var(--accent); }
.summary-note { color: var(--text-secondary); font-size: 0.7rem; font-style: italic; margin-top: 0.75rem; }
.flow-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; margin-top: 0.75rem; }
.flow-col h3 { color: var(--text-secondary); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
.flow-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem 0.7rem; margin-bottom: 0.4rem; display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; font-size: 0.72rem; transition: background-color 0.3s ease; }
.flow-addr { color: #64b5f6; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.flow-addr:hover { text-decoration: underline; }
.flow-addr.nolink { color: var(--text-secondary); cursor: default; }
.flow-addr.nolink:hover { text-decoration: none; }

.flow-cnt { color: var(--text-secondary); white-space: nowrap; }
.tag { font-size: 0.62rem; padding: 0.12rem 0.45rem; border-radius: 8px; white-space: nowrap; }

.tag.spent   { background: #3a1a1a; color: #e08080; }
.tag.unspent { background: #1a3a1a; color: #4caf50; }

/* ── Outputs card ──────────────────────────────────────────────────────────── */
.outputs-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }

.total-pill { background: #f7931a18; border: 1px solid #f7931a33; border-radius: 20px; padding: 0.3rem 0.85rem; font-size: 0.8rem; color: var(--accent); font-weight: bold; white-space: nowrap; }
.total-pill .fiat { color: var(--text-secondary); font-size: 0.7rem; font-weight: normal; }
.wallet-list { display: flex; flex-direction: column; gap: 0.5rem; }
.wallet-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 0.85rem 1rem; display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 0.5rem; transition: border-color 0.15s, background-color 0.3s ease; }
.wallet-item:hover { border-color: #f7931a44; }
.wallet-addr { font-size: 0.78rem; color: var(--text-primary); word-break: break-all; display: flex; align-items: center; gap: 0.45rem; flex-wrap: wrap; }
.wallet-addr .idx { color: var(--text-secondary); font-size: 0.68rem; min-width: 1.5rem; }
.addr-text { color: #64b5f6; cursor: pointer; flex: 1; min-width: 14ch; }

.addr-text.op-return { color: var(--text-secondary); font-style: italic; cursor: default; }

.wallet-amount .btc  { color: var(--accent); font-size: 0.9rem; font-weight: bold; }
.wallet-amount .sat  { color: var(--text-secondary); font-size: 0.67rem; }
.wallet-amount .fiat { color: var(--text-secondary); font-size: 0.67rem; }
.copy-btn { background: var(--bg-card); color: var(--text-secondary); border: none; padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.63rem; cursor: pointer; transition: all 0.15s; margin-left: 0.25rem; }
.copy-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }
.copy-btn.copied { background: #1a3a1a; color: #4caf50; }

/* ── Transaction list ──────────────────────────────────────────────────────── */
.tx-list { display: flex; flex-direction: column; gap: 0.4rem; }

.tx-list-item:hover { border-color: #f7931a44; }
.tx-dir { font-size: 1.2rem; text-align: center; line-height: 1; }
.tx-li-info { min-width: 0; }
.tx-li-id { color: #64b5f6; font-size: 0.72rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tx-li-date { color: var(--text-secondary); font-size: 0.67rem; margin-top: 0.15rem; }
.tx-li-amt { text-align: right; }
.tx-li-btc { font-size: 0.95rem; font-weight: bold; white-space: nowrap; }
.tx-li-btc.rcv { color: #4caf50; }
.tx-li-btc.snt { color: #e05050; }
.tx-li-fiat { color: var(--text-secondary); font-size: 0.67rem; text-align: right; margin-top: 0.15rem; }
.tx-badge { font-size: 0.63rem; padding: 0.2rem 0.5rem; border-radius: 10px; white-space: nowrap; align-self: center; }
.tx-badge.conf { background: #1a3a1a; color: #4caf50; }
.tx-badge.pend { background: #3a2a00; color: #ffb300; animation: blink 1.8s ease-in-out infinite; }

/* ── UTXO section ──────────────────────────────────────────────────────────── */
.utxo-details { border-top: 1px solid var(--border); }
.utxo-details > summary { color: var(--text-secondary) !important; font-size: 0.77rem !important; cursor: pointer; padding: 0.9rem 1.25rem !important; list-style: none; display: flex !important; align-items: center; gap: 0.5rem; user-select: none; transition: color 0.15s; }
.utxo-details > summary:hover { color: var(--text-primary) !important; }
.utxo-details > summary strong { color: var(--accent); }
.utxo-list { padding: 0 1.25rem 1rem; display: flex; flex-direction: column; gap: 0.35rem; }
.utxo-row { display: grid; grid-template-columns: auto 1fr auto; gap: 0.6rem; align-items: center; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem 0.75rem; font-size: 0.72rem; transition: background-color 0.3s ease; }

.utxo-txid:hover { text-decoration: underline; }
.utxo-age { color: var(--text-secondary); text-align: center; }
.utxo-amt { color: var(--accent); font-weight: bold; text-align: right; white-space: nowrap; }
.utxo-fiat { color: var(--text-secondary); font-weight: normal; font-size: 0.66rem; }
.utxo-more { grid-template-columns: 1fr; justify-items: center; background: transparent; border-style: dashed; color: var(--text-secondary); }

/* ── Privacy badge ─────────────────────────────────────────────────────────── */
.privacy-badge { padding: 0.6rem 1.5rem; font-size: 0.75rem; font-weight: bold; border-bottom: 1px solid; }
.privacy-badge.pv-green { background: #071a0e; border-color: #1a4a25; color: #4ade80; }
.privacy-badge.pv-red   { background: #1a0707; border-color: #4a1515; color: #f87171; }

/* ── Animations ────────────────────────────────────────────────────────────── */
@keyframes fadeSlide { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
#result.fade-in { animation: fadeSlide 0.35s ease-out; }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 0.4rem; }
@keyframes spin { to { transform: rotate(360deg); } }
#result { display: none; }

/* ── Modal ─────────────────────────────────────────────────────────────────── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 9999; animation: fadeSlide 0.2s ease-out; }
.modal-box { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 14px; padding: 1.75rem; max-width: 420px; width: 90%; box-shadow: 0 0 40px var(--shadow); transition: background-color 0.3s ease; }
.modal-title { color: var(--accent); font-size: 1rem; font-weight: bold; margin-bottom: 0.85rem; }

.modal-inp { width: 100%; background: var(--input-bg); border: 1px solid var(--border); color: var(--text-primary); padding: 0.7rem 1rem; border-radius: 6px; font-family: 'Courier New', monospace; font-size: 0.85rem; outline: none; margin-bottom: 1rem; transition: border-color 0.2s; box-sizing: border-box; }
.modal-inp:focus { border-color: var(--accent); }

/* ── Badge de confirmacions ─────────────────────────────────────────────────── */
.conf-badge, .unconf-badge { padding: 0.15rem 0.65rem; border-radius: 10px; font-size: 0.75rem; font-weight: bold; margin-left: 0.5rem; white-space: nowrap; }
.conf-badge   { background: rgba(74,222,128,0.16); color: #4ade80; border: 1px solid rgba(74,222,128,0.4); }
.unconf-badge { background: rgba(255,179,0,0.16);  color: #ffb300; border: 1px solid rgba(255,179,0,0.4); animation: blink 1.8s ease-in-out infinite; }

.ln-net-badge { background: var(--bg-card); color: #a78bfa; font-size: 0.62rem; padding: 0.12rem 0.5rem; border-radius: 8px; border: 1px solid var(--border); margin-left: 0.5rem; white-space: nowrap; }
.ln-expired { background: rgba(224,80,80,0.16); color: #f87171; border: 1px solid rgba(224,80,80,0.4); padding: 0.15rem 0.6rem; border-radius: 10px; font-size: 0.72rem; font-weight: bold; margin-left: 0.5rem; white-space: nowrap; }

.lang-switch { display: flex; gap: 0.2rem; }
.lang-btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); padding: 0.2rem 0.45rem; border-radius: 5px; font-size: 0.68rem; cursor: pointer; font-family: 'Courier New', monospace; transition: all 0.15s; }

    if (!input) { kh = e => { if (e.key === 'Enter' || e.key === 'Escape') done(e.key === 'Enter' || cancelText === null ? true : false); }; document.addEventListener('keydown', kh); }
  });
}

let trackState = null;

async function startTracking(txid) {
  stopTracking();
  trackState = { txid, mainInterval: null, countInterval: null, countdown: 30 };
  const el = document.getElementById('tracker');
  el.style.display = 'block';
  el.innerHTML = `<div class="tracker-card"><div class="tracker-header"><span class="tracker-title">${t('track_title')}</span><button class="tracker-stop" onclick="stopTracking()">${t('track_stop')}</button></div><div style="color:#555;text-align:center;padding:0.5rem;font-size:0.8rem"><span class="spinner"></span>${t('loading')}</div></div>`;
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
  await doTrackerTick();
  if (trackState && !trackState.mainInterval) { trackState.mainInterval = setInterval(doTrackerTick, 30000); startCountdown(); }
}
function startCountdown() {
  if (!trackState) return;
  if (trackState.countInterval) clearInterval(trackState.countInterval);
  trackState.countdown = 30;
  trackState.countInterval = setInterval(() => {
    if (!trackState) return;
    trackState.countdown = Math.max(0, trackState.countdown - 1);
    const el = document.getElementById('trk-countdown');
    if (el) el.textContent = t('track_updating', { n: trackState.countdown });
  }, 1000);
}
function stopTracking() {
  if (trackState) { if (trackState.mainInterval) clearInterval(trackState.mainInterval); if (trackState.countInterval) clearInterval(trackState.countInterval); trackState = null; }
  const el = document.getElementById('tracker'); if (el) el.style.display = 'none';
}
async function doTrackerTick() {
  if (!trackState) return;
  const { txid } = trackState;
  try {
    let tx = null, tipHeight = null, fees = null;
    // Try mempool.space
    const [txRes, tipRes, feesRes] = await Promise.allSettled([
      fetch('https://mempool.space/api/tx/' + txid, { signal: AbortSignal.timeout(8000) }).then(r => r.ok ? r.json() : Promise.reject()),
      fetch('https://mempool.space/api/blocks/tip/height', { signal: AbortSignal.timeout(5000) }).then(r => r.ok ? r.text() : null),
      fetch('https://mempool.space/api/v1/fees/recommended', { signal: AbortSignal.timeout(5000) }).then(r => r.ok ? r.json() : null)
    ]);
    if (txRes.status === 'fulfilled') {
      tx = txRes.value;
      tipHeight = tipRes.status === 'fulfilled' && tipRes.value ? parseInt(tipRes.value) : null;
      fees = feesRes.status === 'fulfilled' ? feesRes.value : null;
    } else {
      // Fallback: blockstream.info
      const [txR2, tipR2] = await Promise.allSettled([
        fetch('https://blockstream.info/api/tx/' + txid, { signal: AbortSignal.timeout(8000) }).then(r => r.ok ? r.json() : Promise.reject()),
        fetch('https://blockstream.info/api/blocks/tip/height', { signal: AbortSignal.timeout(5000) }).then(r => r.ok ? r.text() : null)
      ]);
      if (txR2.status !== 'fulfilled') return;
      tx = txR2.value;
      tipHeight = tipR2.status === 'fulfilled' && tipR2.value ? parseInt(tipR2.value) : null;
    }
    const conf = tx.status && tx.status.confirmed;
    const blockH = tx.status && tx.status.block_height;
    const confs = conf && tipHeight && blockH ? tipHeight - blockH + 1 : 0;
    apiCache.delete('/tx/' + txid);
    const trackerEl = document.getElementById('tracker');
    if (trackerEl) trackerEl.innerHTML = buildTrackerHtml(tx, confs, fees);
    updateStatusBanner(tx, confs);
    if (confs >= 6) {
      if ('Notification' in window && Notification.permission === 'granted') new Notification(t('notif_confirmed_title'), { body: t('notif_confirmed_body', { h: blockH, conf: pl(confs, 'conf') }) });
      if (trackState) { clearInterval(trackState.mainInterval); clearInterval(trackState.countInterval); trackState.mainInterval = null; trackState.countInterval = null; }
    } else if (trackState) { startCountdown(); }
  } catch {}
}
function calcFeeRate(tx) {
  if (!tx || !tx.fee) return null;
  if (tx.weight) return (tx.fee * 4 / tx.weight).toFixed(1);
  if (tx.vsize)  return (tx.fee / tx.vsize).toFixed(1);
  if (tx.size)   return (tx.fee / tx.size).toFixed(1);
  return null;
}
function estimateEta(feeRate, fees) {
  if (!feeRate || !fees) return null;
  const r = parseFloat(feeRate);
  if (r >= fees.fastestFee)  return t('eta_next_block');
  if (r >= fees.halfHourFee) return t('eta_30');
  if (r >= fees.hourFee)     return t('eta_1h');
  if (r >= fees.economyFee)  return t('eta_1_4h');
  return t('eta_uncertain');
}
function buildTrackerHtml(tx, confs, fees) {
  const conf = tx.status && tx.status.confirmed; const blockH = tx.status && tx.status.block_height;
  const feeRate = calcFeeRate(tx); const eta = !conf ? estimateEta(feeRate, fees) : null; const done = confs >= 6;
  let ph1, ph2, ph3, barCls, barStyle, statusMsg;
  if (!conf) { ph1='ph-active'; ph2='ph-inactive'; ph3='ph-inactive'; barCls='tbf-mempool'; barStyle=''; statusMsg=t('track_mempool_status'); }
  else if (!done) { ph1='ph-done'; ph2='ph-partial'; ph3='ph-inactive'; barCls='tbf-partial'; barStyle=`style="width:${Math.round(confs/6*100)}%"`; statusMsg=t('track_in_block', { h: blockH, c: confs }); }
  else { ph1='ph-done'; ph2='ph-done'; ph3='ph-done'; barCls='tbf-done'; barStyle='style="width:100%"'; statusMsg=t('track_confirmed', { h: blockH, conf: pl(confs, 'conf') }); }
  const feeRow = feeRate ? `<div class="tracker-fee-row">${t('track_fee_paid')} <strong>${feeRate} sat/vB</strong>${fees&&fees.fastestFee?` &nbsp;·&nbsp; ${t('track_fee_recommended')} <strong>${fees.fastestFee} sat/vB</strong>`:''}${eta?` &nbsp;→&nbsp; <span class="tracker-eta">⏱ ${eta}</span>`:''}</div>` : '';
  return `<div class="tracker-card"><div class="tracker-header"><span class="tracker-title">${t('track_title')}</span><button class="tracker-stop" onclick="stopTracking()">${t('track_stop')}</button></div><div class="tracker-phases"><div class="ph ${ph1}">${t('ph_mempool')}</div><div class="ph-arrow">→</div><div class="ph ${ph2}">${conf&&!done?t('ph_conf_progress', { c: confs }):t('ph_first_conf')}</div><div class="ph-arrow">→</div><div class="ph ${ph3}">${t('ph_confirmed')}</div></div><div class="tracker-bar-wrap"><div class="tracker-bar-fill ${barCls}" ${barStyle}></div></div><div class="tracker-status">${statusMsg}</div>${feeRow}<div class="tracker-footer"><span>${t('track_updated', { time: new Date().toLocaleTimeString(loc()) })}</span><span class="tracker-countdown" id="trk-countdown">${done?t('track_done'):t('track_updating', { n: 30 })}</span></div></div>`;
}
function updateStatusBanner(tx, confs) {
  const el = document.getElementById('tx-status-banner'); if (!el) return;
  if (tx.status && tx.status.confirmed) { const blk = tx.status.block_height; el.className = 'tx-status-banner confirmed'; el.innerHTML = `<span class="tx-status-icon">✓</span><span>${t('banner_confirmed_block', { blk })}${confs>1?` &nbsp;·&nbsp; ${pl(confs, 'conf')}`:''}</span>`; }
}

// ── Alertes per a adreces ─────────────────────────────────────────────────────
let alertPollInterval = null;
function loadAlerts()   { try { return JSON.parse(localStorage.getItem(ALERTS_KEY) || '{}'); } catch { return {}; } }
function saveAlerts(a)  { localStorage.setItem(ALERTS_KEY, JSON.stringify(a)); }
function isAlertActive(addr) { const a = loadAlerts(); return !!(a[addr] && a[addr].enabled); }

async function toggleAlert(addr, name) {
  const a = loadAlerts();
  if (a[addr] && a[addr].enabled) {
    a[addr].enabled = false; saveAlerts(a);
  } else {
    if ('Notification' in window && Notification.permission === 'default') {
      const perm = await Notification.requestPermission();
      if (perm !== 'granted') { await showModal({ title: '🔔 Sense permís', message: 'Cal permís de notificació per activar les alertes.', confirmText: 'Entès' }); return; }
    }
    let lastTxid = null;
    try { const r = await fetch(`https://mempool.space/api/address/${addr}/txs`, { signal: AbortSignal.timeout(8000) }); if (r.ok) { const txs = await r.json(); if (txs && txs[0]) lastTxid = txs[0].txid; } } catch {}
    a[addr] = { enabled: true, name: name || addr.slice(0, 14) + '…', lastTxid }; saveAlerts(a);
    if (!alertPollInterval) startAlertPolling();
    showModal({ title: '🔔 Alerta activada', message: '⚠️ Les alertes només funcionen mentre aquesta pestanya estigui oberta al navegador.', confirmText: 'Entès' });
  }
  const btn = document.getElementById('alert-btn-' + addr);
  if (btn) { const active = isAlertActive(addr); btn.className = active ? 'bell-btn active' : 'bell-btn'; btn.textContent = active ? '🔔 Activa' : '🔔 Alertes'; }
}

function startAlertPolling() { if (alertPollInterval) return; alertPollInterval = setInterval(doAlertCheck, 60000); }

async function doAlertCheck() {
  const a = loadAlerts();
  const active = Object.entries(a).filter(([, v]) => v.enabled);
  if (!active.length) { clearInterval(alertPollInterval); alertPollInterval = null; return; }
  for (const [addr, data] of active) {
    try {
      let txs = null;
      try { const r = await fetch(`https://mempool.space/api/address/${addr}/txs`, { signal: AbortSignal.timeout(8000) }); if (r.ok) txs = await r.json(); } catch {}
      if (!txs) { try { const r = await fetch(`https://blockstream.info/api/address/${addr}/txs`, { signal: AbortSignal.timeout(8000) }); if (r.ok) txs = await r.json(); } catch {} }
      if (!txs) continue;
      const latest = txs[0]; if (!latest) continue;
      if (data.lastTxid && latest.txid !== data.lastTxid) {
        const rcv = (latest.vout || []).filter(o => o.scriptpubkey_address === addr).reduce((s, o) => s + (o.value || 0), 0);
        const snt = (latest.vin  || []).filter(v => v.prevout?.scriptpubkey_address === addr).reduce((s, v) => s + (v.prevout.value || 0), 0);
        const net = rcv - snt;
        const amtStr = net >= 0 ? `+${satsToBtc(net)} BTC` : `${satsToBtc(Math.abs(net))} BTC enviats`;
        if ('Notification' in window && Notification.permission === 'granted') new Notification('FindBtc — 🔔 Nova transacció', { body: `${data.name}: ${amtStr}` });
        a[addr] = { ...data, lastTxid: latest.txid }; saveAlerts(a);
      } else if (!data.lastTxid && latest) { a[addr] = { ...data, lastTxid: latest.txid }; saveAlerts(a); }
    } catch {}
  }
}

function renderWalletData(wallet, infoResults, txsResults, price) {
  const walletAddrSet = new Set(wallet.map(e => e.addr));
  let totalBal = 0, totalRcv = 0, totalSnt = 0, failCount = 0;
  wallet.forEach((e, i) => {
    const res = infoResults[i]; if (res.status !== 'fulfilled') { failCount++; return; }
    const cs = res.value.chain_stats || {};
    totalBal += (cs.funded_txo_sum || 0) - (cs.spent_txo_sum || 0);
    totalRcv += cs.funded_txo_sum || 0; totalSnt += cs.spent_txo_sum || 0;
  });

  // Combined TX list (dedup, net from wallet perspective)
  const txMap = new Map();
  wallet.forEach((e, i) => {
    const res = txsResults[i]; if (res.status !== 'fulfilled') return;
    (res.value || []).forEach(tx => { if (!txMap.has(tx.txid)) txMap.set(tx.txid, { tx, addrs: new Set() }); txMap.get(tx.txid).addrs.add(e.addr); });
  });
  const combined = [...txMap.values()].map(({ tx, addrs }) => {
    const rcv = (tx.vout || []).filter(o => walletAddrSet.has(o.scriptpubkey_address)).reduce((s, o) => s + (o.value || 0), 0);
    const snt = (tx.vin  || []).filter(v => v.prevout && walletAddrSet.has(v.prevout.scriptpubkey_address)).reduce((s, v) => s + (v.prevout.value || 0), 0);
    return { tx, net: rcv - snt, addrs: [...addrs] };
  }).sort((a, b) => ((b.tx.status?.block_time || 9e9) - (a.tx.status?.block_time || 9e9))).slice(0, 10);

  let html = `<div class="wallet-summary-card">
    <div class="ws-label">Saldo total · ${wallet.length} adreça${wallet.length > 1 ? 'ces' : ''}</div>
    <div class="ws-btc">${satsToBtc(totalBal)}<span class="unit"> BTC</span></div>
    ${fmtFiat(totalBal, price) ? `<div class="ws-fiat">${fmtFiat(totalBal, price)}</div>` : ''}
    <div class="ws-stats">
      <div class="ws-stat"><div class="ws-stat-lbl"><span style="color:#4caf50">↓</span> Total rebut</div><div class="ws-stat-val grn">${satsToBtc(totalRcv)} BTC${fmtFiat(totalRcv,price)?` <span class="ws-fiat-sm">(${fmtFiat(totalRcv,price)})</span>`:''}</div></div>
      <div class="ws-stat"><div class="ws-stat-lbl"><span style="color:#e05050">↑</span> Total enviat</div><div class="ws-stat-val red">${satsToBtc(totalSnt)} BTC${fmtFiat(totalSnt,price)?` <span class="ws-fiat-sm">(${fmtFiat(totalSnt,price)})</span>`:''}</div></div>
      ${failCount ? `<div class="ws-stat"><div class="ws-stat-lbl" style="color:#e05050">⚠ Errors</div><div class="ws-stat-val" style="color:#e05050">${failCount} no carregades</div></div>` : ''}
    </div>
  </div>`;

  // Address list
  html += `<div class="card"><h2>Adreces guardades</h2>`;
  wallet.forEach((entry, i) => {
    const res = infoResults[i]; const ok = res.status === 'fulfilled';
    const cs  = ok ? (res.value.chain_stats || {}) : null;
    const bal = cs ? (cs.funded_txo_sum || 0) - (cs.spent_txo_sum || 0) : null;
    const addrDisp = entry.addr.length > 28 ? entry.addr.slice(0, 14) + '…' + entry.addr.slice(-8) : entry.addr;
    const alertActive = isAlertActive(entry.addr);
    const safeName = (entry.name || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    html += `<div class="wallet-addr-item">
      <div class="wai-info">
        ${entry.name ? `<div class="wai-name">${escapeHtml(entry.name)}</div>` : ''}
        <div class="wai-addr">${addrDisp} <button class="copy-btn" onclick="copyText('${entry.addr}',this)">copiar</button></div>
        <div class="wai-bal${!ok ? ' err' : ''}">${!ok ? 'Error en carregar' : satsToBtc(bal) + ' BTC'}${ok && fmtFiat(bal, price) ? ` <span class="wai-fiat">${fmtFiat(bal, price)}</span>` : ''}</div>
      </div>
      <div class="wai-actions">
        <button class="wai-view-btn" onclick="searchAddr('${entry.addr}')">Veure →</button>
        <button class="bell-btn${alertActive ? ' active' : ''}" id="alert-btn-${entry.addr}" onclick="toggleAlert('${entry.addr}','${safeName}')">${alertActive ? '🔔 Activa' : '🔔 Alertes'}</button>
        <button class="wai-del-btn" onclick="removeAddrConfirm('${entry.addr}')">🗑️</button>
      </div>
    </div>`;
  });
  html += `</div>`;

  // Recent combined transactions
  html += `<div class="card"><h2>Últimes transaccions <span style="color:#555;font-size:0.8rem">(${combined.length} de totes les adreces)</span></h2>`;
  if (!combined.length) { html += `<div style="color:#555;text-align:center;padding:1rem;font-size:0.82rem">Cap transacció trobada.</div>`; }
  else {
    html += `<div class="tx-list">`;
    combined.forEach(({ tx, net, addrs }) => {
      const conf = tx.status && tx.status.confirmed; const isRcv = net >= 0;
      const absNet = Math.abs(net); const txFiat = fmtFiat(absNet, price);
      const txidS = tx.txid.slice(0, 8) + '…' + tx.txid.slice(-8);
      const addrLabel = addrs.length === 1 ? (wallet.find(e => e.addr === addrs[0])?.name || addrs[0].slice(0,10)+'…') : `${addrs.length} adreces`;
      html += `<div class="tx-list-item" onclick="searchTx('${tx.txid}')">
        <span class="tx-dir" style="color:${isRcv?'#4caf50':'#e05050'}">${isRcv?'↓':'↑'}</span>
        <div class="tx-li-info"><div class="tx-li-id">${txidS}</div><div class="tx-li-date">${fmtDate(tx.status?.block_time)} · ${addrLabel}</div></div>
        <div class="tx-li-amt"><div class="tx-li-btc ${isRcv?'rcv':'snt'}">${isRcv?'+':'−'}${satsToBtc(absNet)} BTC</div>${txFiat?`<div class="tx-li-fiat">${txFiat}</div>`:''}</div>
        <span class="tx-badge ${conf?'conf':'pend'}">${conf?'✓':'⏳'}</span>
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

// ── Input detection ───────────────────────────────────────────────────────────
function normalizeQuery(v) {
  // URI BIP21: bitcoin:<adreça>?amount=…&label=…&lightning=lnbc…
  if (/^bitcoin:/i.test(v)) {
    const body = v.replace(/^bitcoin:/i, '');
    const qIdx = body.indexOf('?');
    const addrPart = (qIdx === -1 ? body : body.slice(0, qIdx)).trim();
    const query = qIdx === -1 ? '' : body.slice(qIdx + 1);
    if (addrPart && detectInput(addrPart)) return addrPart;
    const lnParam = query.match(/(?:^|&)lightning=([^&]+)/i);
    if (lnParam) { try { return decodeURIComponent(lnParam[1]); } catch { return lnParam[1]; } }
    return addrPart || v;
  }
  // Factura/adreça/pubkey partida per espais o salts de línia en enganxar
  if (/\s/.test(v)) { const compact = v.replace(/\s+/g, ''); if (detectInput(compact)) return compact; }
  return v;
}

function detectInput(val) {
  const lnClean = val.replace(/^lightning:/i, '');
  if (/^ln(bcrt|bc|tbs|tb|sb)[0-9]*[munp]?1[ac-hj-np-z02-9]{6,}$/i.test(lnClean)) return { type: 'lninvoice', invoice: lnClean };
  if (/^0[23][0-9a-fA-F]{64}$/.test(val)) return { type: 'lnnode', pubkey: val.toLowerCase() };
  if (/^[0-9a-fA-F]{64}$/.test(val)) return { type: 'txid' };
  if (/^bc1p[a-z0-9]{6,87}$/i.test(val)) return { type: 'address', addrType: 'Taproot (P2TR)' };
  if (/^bc1q[a-z0-9]{6,87}$/i.test(val)) return { type: 'address', addrType: 'SegWit natiu (P2WPKH)' };
  if (/^bc1[a-z0-9]{6,87}$/i.test(val))  return { type: 'address', addrType: 'SegWit (bech32)' };
  if (/^3[a-zA-HJ-NP-Z0-9]{25,34}$/.test(val)) return { type: 'address', addrType: 'P2SH (SegWit compatible)' };
  if (/^1[a-zA-HJ-NP-Z0-9]{25,34}$/.test(val)) return { type: 'address', addrType: 'Legacy (P2PKH)' };
  return null;
}

// ── API fetch ─────────────────────────────────────────────────────────────────
async function apiFetch(path) {
  const hit = apiCache.get(path);
  if (hit && Date.now() - hit.ts < CACHE_TTL) return hit.data;
  const apis = [
    { name: 'mempool.space',    base: 'https://mempool.space/api' },
    { name: 'blockstream.info', base: 'https://blockstream.info/api' }
  ];
  for (let i = 0; i < apis.length; i++) {
    if (i > 0) showLoading(t('api_trying', { a: apis[0].name, b: apis[i].name }));
    try {
      const r = await fetch(apis[i].base + path, { signal: AbortSignal.timeout(8000) });
      if (!r.ok) {
        if (r.status === 404) { const msg = path.startsWith('/tx/') ? t('err_tx_notfound') : t('err_addr_notfound'); throw Object.assign(new Error(msg), { fatal: true }); }
        throw new Error(`HTTP ${r.status}`);
      }
      const data = await r.json(); apiCache.set(path, { data, ts: Date.now() }); return data;
    } catch (e) { if (e.fatal) throw e; }
  }
  throw new Error(t('err_no_api'));
}

// ── Cerca principal ───────────────────────────────────────────────────────────
async function search() {
  let val = document.getElementById('txInput').value.trim(); if (!val) return;
  val = normalizeQuery(val);
  const inp = document.getElementById('txInput');
  if (inp.value.trim() !== val) inp.value = val;
  const det = detectInput(val);
  if (!det) { offerNodeSearch(val); return; }
  stopTracking();
  setHashForQuery(val, det.type);
  const gen = ++searchGen;
  const btn = document.getElementById('searchBtn'); btn.disabled = true;
  document.getElementById('result').style.display = 'none'; document.getElementById('result').innerHTML = '';
  showLoading(det.type === 'txid' ? t('load_tx') : det.type === 'lninvoice' ? t('load_invoice') : det.type === 'lnnode' ? t('load_node') : t('load_addr'));
  // Fire price fetch independently — does NOT block rendering
  const priceP = fetchBtcPrice();
  try {
    if (det.type === 'lninvoice') {
      let decoded;
      try { decoded = decodeBolt11(det.invoice); }
      catch (e) { if (gen === searchGen) showError(t('err_invoice') + (e.message || t('err_invoice_fmt'))); return; }
      if (gen !== searchGen) return;
      const price = priceCache && Date.now() - priceCache.ts < PRICE_TTL ? priceCache.price : null;
      renderLnInvoice(decoded, price);
      if (!price) priceP.then(p => { if (p && gen === searchGen) renderLnInvoice(decoded, p); }).catch(() => {});
    } else if (det.type === 'lnnode') {
      let node;
      try { node = await lnApiGet('/nodes/' + det.pubkey); }
      catch (e) { if (gen === searchGen) showError(t('err_node_load')); return; }
      if (gen !== searchGen) return;
      const channels = await lnApiGet('/channels?public_key=' + det.pubkey + '&status=active').catch(() => null);
      if (gen !== searchGen) return;
      const price = priceCache && Date.now() - priceCache.ts < PRICE_TTL ? priceCache.price : null;
      renderLnNode(node, channels, price);
      if (!price) priceP.then(p => { if (p && gen === searchGen) renderLnNode(node, channels, p); }).catch(() => {});
    } else if (det.type === 'txid') {
      const tx = await apiFetch('/tx/' + val);
      if (gen !== searchGen) return;
      const price = priceCache && Date.now() - priceCache.ts < PRICE_TTL ? priceCache.price : null;
      await renderTx(tx, price);
      if (!price) priceP.then(async p => { if (p && gen === searchGen) await renderTx(tx, p); }).catch(() => {});
    } else {
      const [info, txs, utxos] = await Promise.all([apiFetch('/address/' + val), apiFetch('/address/' + val + '/txs'), fetchUtxos(val)]);
      if (gen !== searchGen) return;
      const price = priceCache && Date.now() - priceCache.ts < PRICE_TTL ? priceCache.price : null;
      renderAddress(val, det.addrType, info, txs, price, utxos);
      if (!price) priceP.then(p => { if (p && gen === searchGen) renderAddress(val, det.addrType, info, txs, p, utxos); }).catch(() => {});
    }
    saveHistory(val);
  } catch (e) { if (gen === searchGen) showError(e.message || t('err_query')); }
  finally { if (gen === searchGen) btn.disabled = false; }
}
function searchAddr(addr) { switchTab('search'); document.getElementById('txInput').value = addr; search(); }

// ── Deep-linking (#tx/… · #addr/…) ────────────────────────────────────────────
function setHashForQuery(val, type) {
  const prefix = type === 'txid' ? 'tx/' : type === 'lninvoice' ? 'ln/' : type === 'lnnode' ? 'node/' : 'addr/';
  const newHash = '#' + prefix + val;
  if (location.hash !== newHash) { _suppressHashRoute = true; location.hash = newHash; }
}
function routeFromHash() {
  let raw = decodeURIComponent(location.hash.replace(/^#/, '')).trim();
  raw = raw.replace(/^(tx|addr|ln|node)\//i, '');
  if (!raw) return;
  if (!detectInput(raw)) return;
  const input = document.getElementById('txInput');
  if (input.value.trim() === raw && document.getElementById('result').innerHTML) return;
  switchTab('search');
  input.value = raw;
  search();
}
window.addEventListener('hashchange', () => {
  if (_suppressHashRoute) { _suppressHashRoute = false; return; }
  routeFromHash();
});

function buildPlainSummary(tx, price, knownDests) {
  const vins = tx.vin || [], outs = tx.vout || [];
  const isCb = vins.some(v => v.is_coinbase);
  const conf = tx.status && tx.status.confirmed;
  const total = outs.reduce((s, o) => s + (o.value || 0), 0);
  const feeRate = calcFeeRate(tx);
  const fiat = price ? ` (≈ ${fmtFiat(total, price)})` : '';
  const fiatFee = tx.fee && price ? ` (≈ ${fmtFiat(tx.fee, price)})` : '';
  const status = conf
    ? (tx.status.block_time ? t('st_confirmed_on', { date: new Date(tx.status.block_time * 1000).toLocaleDateString(loc()) }) : t('st_confirmed'))
    : t('st_pending');
  const btc = satsToBtc(total);

  let text = '';
  if (isCb) {
    text = t('ps_coinbase', { btc, block: tx.status?.block_height || '?', status });
  } else if (vins.length === 1 && outs.length <= 3) {
    const fromAddr = vins[0].prevout?.scriptpubkey_address;
    const fromLbl  = getEntityLabel(fromAddr);
    const from = fromLbl ? `${fromLbl.icon} <strong>${fromLbl.name}</strong>` : (fromAddr ? `<strong>${fromAddr.slice(0,10)}…</strong>` : t('ps_from_generic'));
    const destOuts = outs.filter(o => o.scriptpubkey_type !== 'op_return');
    const dest = destOuts.length > 1 ? `<strong>${pl(destOuts.length, 'address')}</strong>` : t('ps_one_address');
    const fee = feeRate ? t('ps_fee', { rate: feeRate, fiatFee }) : '';
    text = t('ps_single', { from, btc, fiat, dest, fee, status });
  } else if (vins.length >= 5 && outs.length <= 2) {
    text = t('ps_consolidation', { inputs: pl(vins.length, 'input'), outputs: pl(outs.length, 'output'), btc, fiat, status });
  } else if (outs.length >= 8) {
    text = t('ps_distribution', { inputs: pl(vins.length, 'input'), recipients: pl(outs.length, 'recipient'), btc, status });
  } else {
    const fee = feeRate ? t('ps_fee_short', { rate: feeRate }) : '';
    text = t('ps_default', { inputs: pl(vins.length, 'input'), btc, fiat, outputs: pl(outs.length, 'output'), fee, status });
  }
  if (knownDests && knownDests.length > 0) text += t('ps_known_dest', { dests: knownDests.join(t('join_and')) });
  return `<div class="plain-summary"><span class="ps-icon">📖</span>${text}</div>`;
}

// ── Preu BTC en el moment de la transacció ────────────────────────────────────
function isToday(ts) {
  const d = new Date(ts * 1000), n = new Date();
  return d.getFullYear() === n.getFullYear() && d.getMonth() === n.getMonth() && d.getDate() === n.getDate();
}

async function fetchHistoricalPrice(blockTime) {
  if (!blockTime) return null;
  if (isToday(blockTime)) return null;
  const d = new Date(blockTime * 1000);
  const dateKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  try { const cached = JSON.parse(localStorage.getItem(PRICE_HIST_PRE + dateKey)); if (cached?.usd) return cached; } catch {}
  const dd = String(d.getDate()).padStart(2,'0'), mm = String(d.getMonth()+1).padStart(2,'0'), yyyy = d.getFullYear();
  // Try CoinGecko first (has EUR too)
  try {
    const r = await fetch(`https://api.coingecko.com/api/v3/coins/bitcoin/history?date=${dd}-${mm}-${yyyy}&localization=false`, { signal: AbortSignal.timeout(7000) });
    if (r.ok) {
      const data = await r.json();
      const cp = data.market_data?.current_price;
      if (cp?.usd) {
        const result = { usd: cp.usd, eur: cp.eur || null, date: dateKey };
        try { localStorage.setItem(PRICE_HIST_PRE + dateKey, JSON.stringify(result)); } catch {}
        return result;
      }
    }
  } catch {}
  // Fallback: Kraken OHLC daily (USD only)
  try {
    const since = Math.floor(d.getTime() / 1000) - 86400;
    const r = await fetch(`https://api.kraken.com/0/public/OHLC?pair=XBTUSD&interval=1440&since=${since}`, { signal: AbortSignal.timeout(7000) });
    if (r.ok) {
      const data = await r.json();
      const ohlc = data.result?.XXBTZUSD;
      if (ohlc?.length) {
        const target = Math.floor(d.getTime() / 1000);
        let best = ohlc[0];
        for (const row of ohlc) { if (Math.abs(row[0] - target) < Math.abs(best[0] - target)) best = row; }
        const usd = parseFloat(best[4]);
        if (usd > 0) {
          const result = { usd, eur: null, date: dateKey };
          try { localStorage.setItem(PRICE_HIST_PRE + dateKey, JSON.stringify(result)); } catch {}
          return result;
        }
      }
    }
  } catch {}
  return null;
}

function utxoAgeStr(ts) {

  if (days < 30) return `fa ${days} dies`;
  const months = Math.floor(days / 30);
  if (months < 12) return `fa ${months} mes${months > 1 ? 'os' : ''}`;
  const years = Math.floor(days / 365);
  return `fa ${years} any${years > 1 ? 's' : ''}`;
}

// ── Anàlisi de privadesa ──────────────────────────────────────────────────────
function detectCoinJoin(tx) {
  const inCount = tx.vin.length, outCount = tx.vout.length;
  if (inCount < 3 || outCount < 3) return false;
  const outValues = tx.vout.map(o => o.value).filter(v => v > 0);
  if (!outValues.length) return false;
  const refVal = outValues[0];
  const equalOutputs = outValues.filter(v => Math.abs(v - refVal) / Math.max(refVal, 1) < 0.05);
  return equalOutputs.length >= outCount * 0.6 && inCount >= 5;
}

function analyzePrivacy(tx) {
  const vins = tx.vin || [], outs = tx.vout || [];
  if (vins.some(v => v.is_coinbase)) return null;
  if (detectCoinJoin(tx)) return { level: 'green', text: t('pv_coinjoin'), detail: t('pv_coinjoin_detail', { inputs: pl(vins.length, 'input'), outputs: pl(outs.length, 'output') }) };
  const inTypes  = vins.map(v => v.prevout?.scriptpubkey_type).filter(Boolean);
  const outTypes = outs.map(o => o.scriptpubkey_type).filter(ty => ty && ty !== 'op_return');
  const allModern = [...inTypes, ...outTypes].every(ty => ty === 'v0_p2wpkh' || ty === 'v0_p2wsh' || ty === 'v1_p2tr');
  if (allModern && inTypes.length > 0) return { level: 'green', text: t('pv_segwit'), detail: t('pv_segwit_detail') };
  if (vins.length <= 2 && outs.length >= 8) return { level: 'red', text: t('pv_batching'), detail: t('pv_batching_detail', { recipients: pl(outs.length, 'recipient'), inputs: pl(vins.length, 'input') }) };
  const allTypes = [...inTypes, ...outTypes];
  const hasLegacy = allTypes.some(ty => ty === 'p2pkh' || ty === 'p2sh');
  const hasSegwit = allTypes.some(ty => ty === 'v0_p2wpkh' || ty === 'v0_p2wsh' || ty === 'v1_p2tr');
  if (hasLegacy && hasSegwit) return { level: 'red', text: t('pv_mix'), detail: t('pv_mix_detail') };
  return null;
}

function buildPrivacyBadge(tx) {
  const a = analyzePrivacy(tx);
  if (!a) return '';
  return `<div class="privacy-badge pv-${a.level}" title="${a.detail}">${a.text}</div>`;
}

function addFlow(map, key, sats) { const e = map.get(key) || { sats: 0, n: 0 }; e.sats += sats; e.n++; map.set(key, e); }

function buildAddressSummary(addr, info, txs, price) {
  const cs = info.chain_stats || {}, bal = (cs.funded_txo_sum||0)-(cs.spent_txo_sum||0);
  const origins = new Map(), dests = new Map();
  let inTx = 0, outTx = 0, coinbase = false, firstTs = null, lastTs = null;
  for (const tx of txs) {
    const ts = tx.status && tx.status.block_time;
    if (ts) { if (!firstTs||ts<firstTs) firstTs=ts; if (!lastTs||ts>lastTs) lastTs=ts; }
    const recv = (tx.vout||[]).filter(o => o.scriptpubkey_address===addr).reduce((s,o)=>s+(o.value||0),0);
    const sent = (tx.vin||[]).filter(v=>v.prevout&&v.prevout.scriptpubkey_address===addr).reduce((s,v)=>s+(v.prevout.value||0),0);
    if (recv > sent) { inTx++; if ((tx.vin||[]).some(v=>v.is_coinbase)) { coinbase=true; addFlow(origins,'coinbase',recv); } else { (tx.vin||[]).forEach(v=>{ const a=v.prevout&&v.prevout.scriptpubkey_address; if(a&&a!==addr) addFlow(origins,a,v.prevout.value||0); }); } }
    else if (sent > 0) { outTx++; (tx.vout||[]).forEach(o=>{ const a=o.scriptpubkey_address; if(a===addr) return; if(o.scriptpubkey_type==='op_return'){addFlow(dests,'op_return',0);return;} addFlow(dests,a||'nostd',o.value||0); }); }
  }
  const p = [];
  if (coinbase) p.push(`Una part dels fons prové <strong>directament de la mineria</strong>: BTC de nova creació.`);
  if (origins.size===1&&!coinbase) p.push(`Tots els fons rebuts provenen d'<strong>una única font</strong>.`);
  else if (origins.size>5) p.push(`Els fons arriben de <strong>${origins.size} orígens diferents</strong>: cobraments múltiples.`);
  if (bal>0&&outTx===0) p.push(`Els fons <strong>encara no s'han mogut</strong>: tot continua a l'adreça.`);
  else if (bal>0) p.push(`Queden <strong>${satsToBtc(bal)} BTC sense gastar</strong>; la resta ja s'ha reenviat.`);
  else if (outTx>0) p.push(`L'adreça està <strong>buida</strong>: tots els fons rebuts s'han reenviat.`);
  const dEntries=[...dests.entries()].filter(([k])=>k!=='op_return'); const totalOut=dEntries.reduce((s,[,v])=>s+v.sats,0);
  if (dEntries.length>1&&totalOut>0) { const top=[...dEntries].sort((a,b)=>b[1].sats-a[1].sats)[0]; if(top[1].sats/totalOut>0.7) p.push(`La major part dels fons enviats (${Math.round(top[1].sats/totalOut*100)}%) van anar a <strong>${shortAddr(top[0])}</strong>.`); }
  for (const [k] of origins) { if (dests.has(k)) { p.push(`<strong>${shortAddr(k)}</strong> apareix com a origen i destí: possibles moviments interns.`); break; } }
  if (firstTs) p.push(`Activitat analitzada: del <strong>${new Date(firstTs*1000).toLocaleDateString(loc())}</strong> al <strong>${new Date(lastTs*1000).toLocaleDateString(loc())}</strong>.`);
  const partial = (cs.tx_count||0) > txs.length;
  return `<div class="card"><h2>Resum del moviment</h2><div class="summary-text">${p.map(t=>`<p>${t}</p>`).join('')}</div><div class="flow-grid"><div class="flow-col"><h3>D'on han sortit els fons</h3>${flowListHtml(origins,price)}</div><div class="flow-col"><h3>Cap a on han anat</h3>${flowListHtml(dests,price)}</div></div><p class="summary-note">${partial?`Anàlisi basada en les ${txs.length} transaccions més recents (de ${(cs.tx_count||0).toLocaleString(loc())} en total). `:''}Heurística sobre dades públiques.</p></div>`;
}

function buildTxSummary(tx, price, outspends, inAddrSet) {
  const vins=tx.vin||[], outs=tx.vout||[], isCb=vins.some(v=>v.is_coinbase);
  const origins=new Map(); let totalIn=0;
  if (isCb) { addFlow(origins,'coinbase',outs.reduce((s,o)=>s+(o.value||0),0)); }
  else { vins.forEach(v=>{ totalIn+=(v.prevout&&v.prevout.value)||0; const a=v.prevout&&v.prevout.scriptpubkey_address; if(a) addFlow(origins,a,v.prevout.value||0); }); }
  const p = [];
  if (isCb) p.push(t('sum_coinbase'));
  else {
    const originsStr = origins.size === 1 ? t('sum_origins_one') : t('sum_origins_many', { n: origins.size });
    p.push(t('sum_funds_out', { origins: originsStr, inputs: pl(vins.length, 'input'), btc: satsToBtc(totalIn) }));
    if (vins.length>=5&&outs.length<=2) p.push(t('sum_consolidation'));
    else if (vins.length<=2&&outs.length>=5) p.push(t('sum_batching', { n: outs.length }));
    else if (outs.length===2) { const chg=outs.some(o=>o.scriptpubkey_address&&inAddrSet.has(o.scriptpubkey_address)); p.push(t('sum_payment', { chg: chg ? t('sum_change_confirmed') : '' })); }
  }
  if (outspends) { const sp=outs.filter(o=>o.scriptpubkey_type!=='op_return').length, spnt=outspends.filter(o=>o&&o.spent).length; if(spnt===0) p.push(t('sum_no_spent')); else if(spnt>=sp) p.push(t('sum_all_spent')); else p.push(t('sum_some_spent', { spent: spnt, total: sp })); }
  return `<div class="card"><h2>${t('sum_title')}</h2><div class="summary-text">${p.map(x=>`<p>${x}</p>`).join('')}</div><div class="flow-grid"><div class="flow-col"><h3>${t('sum_from_label')}</h3>${flowListHtml(origins,price)}</div></div><p class="summary-note">${t('sum_heuristic')}</p></div>`;
}

function exportAddrCsv() {
  if (!_lastAddrExportData) return;
  const { addr, txs, price } = _lastAddrExportData;
  const rows = [['Data (ISO)', 'TXID', 'Tipus', 'BTC', 'EUR', 'USD']];
  for (const tx of txs) {
    const rcvAmt = (tx.vout||[]).filter(o=>o.scriptpubkey_address===addr).reduce((s,o)=>s+(o.value||0),0);
    const sntAmt = (tx.vin||[]).filter(v=>v.prevout&&v.prevout.scriptpubkey_address===addr).reduce((s,v)=>s+(v.prevout.value||0),0);
    const isRcv = rcvAmt >= sntAmt, net = isRcv ? rcvAmt-sntAmt : sntAmt-rcvAmt;
    const btcAmt = (net/1e8).toFixed(8);
    const dateISO = tx.status?.block_time ? new Date(tx.status.block_time*1000).toISOString() : '';
    const eur = price ? (net/1e8*price.eur).toFixed(2) : '';
    const usd = price ? (net/1e8*price.usd).toFixed(2) : '';
    rows.push([dateISO, tx.txid, isRcv ? 'entrada' : 'sortida', btcAmt, eur, usd]);
  }
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const url = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
  const a = document.createElement('a');
  a.href = url; a.download = `findbtc_${addr.slice(0,12)}.csv`; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

// ── Generador de codis QR (mode byte · nivell M · algorisme de K. Arase, MIT) ──
const QRGen = (() => {
  const PAD0 = 0xEC, PAD1 = 0x11;
  const G15 = 0b10100110111, G18 = 0b1111100100101, G15_MASK = 0b101010000010010;
  const EXP = new Array(256), LOG = new Array(256);
  for (let i = 0; i < 8; i++) EXP[i] = 1 << i;
  for (let i = 8; i < 256; i++) EXP[i] = EXP[i-4] ^ EXP[i-5] ^ EXP[i-6] ^ EXP[i-8];
  for (let i = 0; i < 255; i++) LOG[EXP[i]] = i;
  const gexp = n => { while (n < 0) n += 255; while (n >= 256) n -= 255; return EXP[n]; };
  // EC nivell M, versions 1..10 → grups de [numBlocs, codewordsTotals, codewordsDades]
  const RS = { 1:[[1,26,16]], 2:[[1,44,28]], 3:[[1,70,44]], 4:[[2,50,32]], 5:[[2,67,43]],
    6:[[4,43,27]], 7:[[4,49,31]], 8:[[2,60,38],[2,61,39]], 9:[[3,58,36],[2,59,37]], 10:[[4,69,43],[1,70,44]] };
  const ALIGN = { 1:[],2:[6,18],3:[6,22],4:[6,26],5:[6,30],6:[6,34],7:[6,22,38],8:[6,24,42],9:[6,26,46],10:[6,28,50] };

  const bchDigit = n => { let d = 0; while (n !== 0) { d++; n >>>= 1; } return d; };
  function bch(data, g, shift) { let d = data << shift; while (bchDigit(d) - bchDigit(g) >= 0) d ^= g << (bchDigit(d) - bchDigit(g)); return d; }
  const bchTypeInfo   = data => ((data << 10) | bch(data, G15, 10)) ^ G15_MASK;
  const bchTypeNumber = data => (data << 12) | bch(data, G18, 12);

  function polyMul(a, b) {
    const r = new Array(a.length + b.length - 1).fill(0);
    for (let i = 0; i < a.length; i++) for (let j = 0; j < b.length; j++)
      if (a[i] && b[j]) r[i+j] ^= gexp(LOG[a[i]] + LOG[b[j]]);
    return r;
  }
  function genPoly(ec) { let g = [1]; for (let i = 0; i < ec; i++) g = polyMul(g, [1, gexp(i)]); return g; }
  function rsEncode(data, ecLen) {
    const gen = genPoly(ecLen), res = data.concat(new Array(ecLen).fill(0));
    for (let i = 0; i < data.length; i++) { const c = res[i]; if (c) { const lc = LOG[c]; for (let j = 0; j < gen.length; j++) res[i+j] ^= gexp(LOG[gen[j]] + lc); } }

    const seq = (v.sequence >>> 0), lt = ((tx.locktime || 0) >>> 0);
    const isForce = (seq >>> 24) === 0x80 && (lt >>> 24) === 0x20;
    return { closeType: isForce ? 'force' : 'coop', inputIndex: i, fundingTxid: v.txid, fundingVout: v.vout, pubkeys: [pk1, pk2] };
  }
  return null;
}
function lnNodesHtml(pubkeys) {
  return pubkeys.map(pk => `<span class="lc-link" onclick="window.open('https://mempool.space/lightning/node/${pk}','_blank','noopener')" title="${pk}">${pk.slice(0, 18)}…</span>`).join(' &nbsp;·&nbsp; ');
}
function lnCloseBannerHtml(info) {
  const isForce = info.closeType === 'force';
  const badge = isForce ? `<span class="lc-force">${t('ch_force')}</span>` : `<span class="lc-coop">${t('ch_coop')}</span>`;
  const desc = isForce ? t('ch_close_force_desc') : t('ch_close_coop_desc');
  return `<div class="ln-channel">
    <div class="lc-title">${t('ch_close_title')} ${badge}</div>
    <div class="lc-sub">${desc} ${t('ch_close_spends')}</div>
    <div class="lc-sub">${t('ch_opened_at')} <span class="lc-link" onclick="searchTx('${info.fundingTxid}')" title="${info.fundingTxid}">${info.fundingTxid.slice(0, 18)}…:${info.fundingVout}</span></div>
    <div class="lc-sub">${t('ch_nodes')} ${lnNodesHtml(info.pubkeys)}</div>
  </div>`;
}
function lnOpenBannerHtml(info) {
  return `<div class="ln-channel">
    <div class="lc-title">${t('ch_open_title')} <span class="lc-open">${t('ch_open_funding')}</span></div>
    <div class="lc-sub">${t('ch_open_desc', { vout: info.vout })}</div>
    <div class="lc-sub">${t('ch_closed_by')} <span class="lc-link" onclick="searchTx('${info.closeTxid}')" title="${info.closeTxid}">${info.closeTxid.slice(0, 18)}…</span> (${info.closeType === 'force' ? t('ch_force') : t('ch_coop')})</div>
    <div class="lc-sub">${t('ch_nodes')} ${lnNodesHtml(info.pubkeys)}</div>
  </div>`;
}
async function fetchTxQuiet(txid) {
  const hit = apiCache.get('/tx/' + txid);
  if (hit && Date.now() - hit.ts < CACHE_TTL) return hit.data;
  for (const base of ['https://mempool.space/api', 'https://blockstream.info/api']) {
    try { const r = await fetch(base + '/tx/' + txid, { signal: AbortSignal.timeout(8000) }); if (r.ok) { const d = await r.json(); apiCache.set('/tx/' + txid, { data: d, ts: Date.now() }); return d; } } catch {}
  }
  return null;
}
async function detectChannelOpen(tx, outspends) {
  if (!outspends) return null;
  const outs = tx.vout || [], candidates = [];
  for (let i = 0; i < outs.length; i++) {
    if (outs[i].scriptpubkey_type === 'v0_p2wsh' && outspends[i] && outspends[i].spent && outspends[i].txid)
      candidates.push({ vout: i, spendTxid: outspends[i].txid });
  }
  for (const c of candidates.slice(0, 2)) {
    const spendTx = await fetchTxQuiet(c.spendTxid);
    if (!spendTx) continue;
    const det = detectLightningChannel(spendTx);
    if (det && det.fundingTxid === tx.txid && det.fundingVout === c.vout)
      return { vout: c.vout, closeTxid: c.spendTxid, closeType: det.closeType, pubkeys: det.pubkeys };
  }
  return null;
}

// ── Explorador de nodes Lightning (API mempool.space, només mainnet) ──────────
async function lnApiGet(path) {
  const r = await fetch('https://mempool.space/api/v1/lightning' + path, { signal: AbortSignal.timeout(12000) });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
function searchLnNode(pk) { switchTab('search'); document.getElementById('txInput').value = pk; search(); }

function offerNodeSearch(val) {
  _lastUnrecognized = val;
  const s = document.getElementById('status');
  s.className = 'error'; s.style.display = 'block';
  s.innerHTML = `${t('offer_unrecognized')}<div style="margin-top:0.7rem"><button class="track-btn" style="margin:0;color:#a78bfa;border-color:#a78bfa44" onclick="searchLnNodes()">🔍 ${t('offer_search_node', { q: escapeHtml(val) })}</button></div>`;
}

function renderLnNode(node, channels, price) {
  hideStatus();
  const cap = Number(node.capacity) || 0;
  const safeColor = /^#[0-9a-f]{6}$/i.test(node.color || '') ? node.color : '#888888';
  const alias = escapeHtml(node.alias || '(sense àlias)');
  const pk = node.public_key;
  const pkDisp = pk.slice(0, 20) + '…' + pk.slice(-12);
  const capFiat = fmtFiat(cap, price);
  const country = node.country ? escapeHtml(node.country.es || node.country.en || '') : '';
  const city = node.city ? escapeHtml(node.city.es || node.city.en || '') : '';
  const loc = [city, country].filter(Boolean).join(', ');
  const isp = node.as_organization ? escapeHtml(node.as_organization) : '';
  const sockets = (node.sockets || '').split(',').map(s => s.trim()).filter(Boolean);
  const chList = Array.isArray(channels) ? channels : [];

  let html = mkPriceBar(price) + `
  <div class="addr-hero">
    <div class="addr-hero-top">
      <div class="addr-hero-sublabel">⚡ Node Lightning <span style="display:inline-block;width:0.85rem;height:0.85rem;border-radius:3px;background:${safeColor};border:1px solid var(--border);vertical-align:middle" title="Color del node"></span></div>
      <div style="font-size:1.5rem;color:var(--accent);font-weight:bold;margin:0.25rem 0 0.35rem;word-break:break-word">${alias}</div>
      <div class="addr-str">${pkDisp} <button class="copy-btn" onclick="copyText('${pk}',this)">copiar</button> <a class="copy-btn" href="https://mempool.space/lightning/node/${pk}" target="_blank" rel="noopener" style="text-decoration:none">↗ mempool</a></div>
    </div>
    <div class="addr-balance-hero">${satsToBtc(cap)}<span class="unit"> BTC</span></div>
    <div class="addr-fiat-hero">Capacitat total${capFiat ? ` · ${capFiat}` : ''}</div>
    <div class="addr-stats-row">
      <div class="addr-stat"><div class="lbl">Canals actius</div><div class="v neu">${(node.active_channel_count || 0).toLocaleString(loc())}</div></div>
      <div class="addr-stat"><div class="lbl">Oberts (històric)</div><div class="v neu">${(node.opened_channel_count || 0).toLocaleString(loc())}</div></div>
      <div class="addr-stat"><div class="lbl">Tancats</div><div class="v neu">${(node.closed_channel_count || 0).toLocaleString(loc())}</div></div>
    </div>
  </div>`;

  // Targeta d'informació
  const rows = [];
  if (loc) rows.push(['📍 Ubicació', loc]);
  if (isp) rows.push(['🌐 Proveïdor (ISP)', isp + (node.as_number ? ` · AS${node.as_number}` : '')]);
  if (node.first_seen) rows.push(['👁 Primer cop vist', fmtDate(node.first_seen)]);
  if (node.updated_at) rows.push(['🔄 Última actualització', fmtDate(node.updated_at)]);
  let infoHtml = rows.map(([k, v]) => `<div class="det-cell"><div class="lbl">${k}</div><div class="val">${v}</div></div>`).join('');
  if (sockets.length) {
    const socketsHtml = sockets.map(s => `<div style="font-size:0.72rem;color:var(--text-secondary);word-break:break-all">${s.includes('.onion') ? '🧅 ' : '🌍 '}${escapeHtml(s)}</div>`).join('');
    infoHtml += `<div class="det-cell" style="grid-column:1/-1"><div class="lbl">🔌 Adreces de connexió</div><div class="val">${socketsHtml}</div></div>`;
  }
  if (infoHtml) html += `<div class="card"><h2>Informació del node</h2><div class="det-grid">${infoHtml}</div></div>`;

  // Targeta de canals
  const totalCh = node.active_channel_count || chList.length;
  const countLabel = totalCh > chList.length ? `mostrant ${chList.length} de ${totalCh.toLocaleString(loc())}` : `${chList.length} ${chList.length === 1 ? 'canal' : 'canals'}`;
  html += `<div class="card"><h2>Canals <span style="color:var(--text-secondary);font-size:0.8rem">(${countLabel})</span></h2>`;
  if (chList.length) {
    const sorted = [...chList].sort((a, b) => (Number(b.capacity) || 0) - (Number(a.capacity) || 0));
    const SHOW = 20;
    html += `<div class="wallet-list">`;
    sorted.slice(0, SHOW).forEach(ch => {
      const peer = ch.node || {};
      const peerAlias = escapeHtml(peer.alias || (peer.public_key ? peer.public_key.slice(0, 14) + '…' : 'desconegut'));
      const chCap = Number(ch.capacity) || 0, chFiat = fmtFiat(chCap, price);
      html += `<div class="wallet-item"><div class="wallet-addr"><span class="addr-text" ${peer.public_key ? `onclick="searchLnNode('${peer.public_key}')" title="${peer.public_key}"` : 'style="color:var(--text-secondary);cursor:default"'}>${peerAlias}</span></div><div class="wallet-amount"><div class="btc">${satsToBtc(chCap)} BTC</div>${chFiat ? `<div class="fiat">${chFiat}</div>` : ''}${ch.fee_rate != null ? `<div class="sat">${ch.fee_rate} ppm</div>` : ''}</div></div>`;
    });
    html += `</div>`;
    if (sorted.length > SHOW) html += `<p class="summary-note">Mostrant els ${SHOW} canals de més capacitat de ${sorted.length}.</p>`;
  } else {
    html += `<p style="color:var(--text-secondary);text-align:center;padding:1rem;font-size:0.82rem">No s'han pogut carregar els canals (o el node no en té d'actius).</p>`;
  }
  html += `<p class="summary-note">Dades del graf públic de la xarxa via mempool.space.</p></div>`;

  showResult(html);
}

function searchLnNodes(text) {
  text = (text || _lastUnrecognized || '').trim();
  if (!text) return;
  switchTab('search');
  showLoading(t('load_nodes_search', { q: escapeHtml(text) }));
  document.getElementById('result').style.display = 'none';
  const gen = ++searchGen;
  lnApiGet('/search?searchText=' + encodeURIComponent(text))
    .then(res => { if (gen === searchGen) renderLnNodeSearch(text, res); })
    .catch(() => { if (gen === searchGen) showError(t('err_node_search')); });
}

function renderLnNodeSearch(text, res) {
  hideStatus();
  const nodes = (res && res.nodes) || [];
  let html = `<div class="card"><h2>Nodes Lightning «${escapeHtml(text)}» <span style="color:var(--text-secondary);font-size:0.8rem">(${nodes.length})</span></h2>`;
  if (!nodes.length) {
    html += `<p style="color:var(--text-secondary);text-align:center;padding:1.25rem;font-size:0.85rem">Cap node trobat amb aquest nom.</p></div>`;
    showResult(html); return;
  }
  html += `<div class="wallet-list">`;
  nodes.forEach(n => {
    const alias = escapeHtml(n.alias || '(sense àlias)');
    const cap = n.capacity != null ? satsToBtc(Number(n.capacity)) + ' BTC' : '—';
    const chans = n.channels != null ? Number(n.channels).toLocaleString(loc()) + ' canals' : '';
    html += `<div class="wallet-item" style="cursor:pointer" onclick="searchLnNode('${n.public_key}')"><div class="wallet-addr"><div style="min-width:0"><div style="color:var(--accent);font-weight:bold">${alias}</div><div style="color:var(--text-secondary);font-size:0.66rem;word-break:break-all">${n.public_key.slice(0, 28)}…</div></div></div><div class="wallet-amount"><div class="btc">${cap}</div>${chans ? `<div class="sat">${chans}</div>` : ''}</div></div>`;
  });
  html += `</div></div>`;
  showResult(html);
}

// ── Utilitats UI ──────────────────────────────────────────────────────────────
function showResult(html) {
  const r = document.getElementById('result');
  r.innerHTML = html; r.classList.remove('fade-in'); r.style.display = 'block';
  void r.offsetWidth; r.classList.add('fade-in');
}
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => { btn.textContent = t('copied'); btn.classList.add('copied'); setTimeout(() => { btn.textContent = t('copy'); btn.classList.remove('copied'); }, 1500); });
}
function showLoading(msg) { const s = document.getElementById('status'); s.className = 'loading'; s.style.display = 'block'; s.innerHTML = '<span class="spinner"></span>' + msg; }
function showError(msg)   { const s = document.getElementById('status'); s.className = 'error'; s.style.display = 'block'; s.textContent = '⚠ ' + msg; }
function hideStatus()     { const s = document.getElementById('status'); s.className = ''; s.style.display = 'none'; }

// ── Tema clar/fosc ────────────────────────────────────────────────────────────
function initTheme() {
  const saved = localStorage.getItem('findbtc_theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const isDark = saved ? saved === 'dark' : prefersDark;
  applyTheme(isDark ? 'dark' : 'light');
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
    if (!localStorage.getItem('findbtc_theme')) applyTheme(e.matches ? 'dark' : 'light');
  });
}
function applyTheme(theme) {
  document.body.classList.toggle('light-mode', theme === 'light');
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = theme === 'light' ? '🌙' : '☀️';
}
function toggleTheme() {
  const newTheme = document.body.classList.contains('light-mode') ? 'dark' : 'light';
  localStorage.setItem('findbtc_theme', newTheme);
  applyTheme(newTheme);
}
initTheme();
</script>
